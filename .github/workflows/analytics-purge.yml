name: Analytics physical deletion

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      execute:
        description: Claim and physically delete pending sessions
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: analytics-physical-deletion
  cancel-in-progress: false

jobs:
  purge:
    environment: production-analytics
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install Spark
        if: github.event_name == 'schedule' || inputs.execute == true
        run: python -m pip install --disable-pip-version-check pyspark==3.5.8

      - name: Process pending deletions
        shell: bash
        env:
          ORANGE_REPLAY_PURGE_API_URL: ${{ vars.ORANGE_REPLAY_PURGE_API_URL }}
          ANALYTICS_PURGE_RUNNER_TOKEN: ${{ secrets.ANALYTICS_PURGE_RUNNER_TOKEN }}
          R2_CATALOG_URI: ${{ vars.R2_CATALOG_URI }}
          R2_SQL_WAREHOUSE: ${{ vars.R2_SQL_WAREHOUSE }}
          ORANGE_REPLAY_CATALOG_TOKEN: ${{ secrets.ORANGE_REPLAY_CATALOG_TOKEN }}
        run: |
          arguments=()
          if [[ "${{ github.event_name }}" == "schedule" || "${{ inputs.execute }}" == "true" ]]; then
            arguments+=(--execute)
          fi
          python infra/analytics/purge_pending.py "${arguments[@]}"
