name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  VITE_GIT_HOOKS: "0"

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COREPACK_HOME: ${{ runner.temp }}/corepack-home
      HOME: ${{ runner.temp }}/home

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          mkdir -p "$RUNNER_TEMP/corepack-bin" "$COREPACK_HOME" "$HOME"
          corepack enable --install-directory "$RUNNER_TEMP/corepack-bin"
          corepack prepare pnpm@11.9.0 --activate
          echo "$RUNNER_TEMP/corepack-bin" >> "$GITHUB_PATH"

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install
        run: |
          pnpm install --frozen-lockfile
          test -x node_modules/.bin/vp

      - name: Check
        run: pnpm exec vp check

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      COREPACK_HOME: ${{ runner.temp }}/corepack-home
      HOME: ${{ runner.temp }}/home

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          mkdir -p "$RUNNER_TEMP/corepack-bin" "$COREPACK_HOME" "$HOME"
          corepack enable --install-directory "$RUNNER_TEMP/corepack-bin"
          corepack prepare pnpm@11.9.0 --activate
          echo "$RUNNER_TEMP/corepack-bin" >> "$GITHUB_PATH"

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install
        run: |
          pnpm install --frozen-lockfile
          test -x node_modules/.bin/vp

      - name: Remove local Worker env file
        run: |
          # The fails-closed test must run without apps/worker/.dev.vars, matching CI.
          rm -f apps/worker/.dev.vars

      - name: Test
        run: pnpm exec vp test

  budgets:
    name: budgets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COREPACK_HOME: ${{ runner.temp }}/corepack-home
      HOME: ${{ runner.temp }}/home

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          mkdir -p "$RUNNER_TEMP/corepack-bin" "$COREPACK_HOME" "$HOME"
          corepack enable --install-directory "$RUNNER_TEMP/corepack-bin"
          corepack prepare pnpm@11.9.0 --activate
          echo "$RUNNER_TEMP/corepack-bin" >> "$GITHUB_PATH"

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install
        run: |
          pnpm install --frozen-lockfile
          test -x node_modules/.bin/vp

      - name: Check SDK budgets
        run: pnpm --filter @orange-replay/sdk run budget

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      COREPACK_HOME: ${{ runner.temp }}/corepack-home
      HOME: ${{ runner.temp }}/home

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          mkdir -p "$RUNNER_TEMP/corepack-bin" "$COREPACK_HOME" "$HOME"
          corepack enable --install-directory "$RUNNER_TEMP/corepack-bin"
          corepack prepare pnpm@11.9.0 --activate
          echo "$RUNNER_TEMP/corepack-bin" >> "$GITHUB_PATH"

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install
        run: |
          pnpm install --frozen-lockfile
          test -x node_modules/.bin/vp

      - name: Remove local Worker env file
        run: |
          # Keep the fails-closed behavior by running without apps/worker/.dev.vars, matching CI.
          rm -f apps/worker/.dev.vars

      - name: Install Playwright Chromium
        working-directory: fixtures/demo-site
        run: npx playwright install --with-deps chromium

      - name: Run fixture e2e
        working-directory: fixtures/demo-site
        run: pnpm run e2e

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: |
            fixtures/demo-site/playwright-report/
            fixtures/demo-site/test-results/
          if-no-files-found: ignore
          retention-days: 7

  mirror:
    name: mirror
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      COREPACK_HOME: ${{ runner.temp }}/corepack-home
      HOME: ${{ runner.temp }}/home

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          mkdir -p "$RUNNER_TEMP/corepack-bin" "$COREPACK_HOME" "$HOME"
          corepack enable --install-directory "$RUNNER_TEMP/corepack-bin"
          corepack prepare pnpm@11.9.0 --activate
          echo "$RUNNER_TEMP/corepack-bin" >> "$GITHUB_PATH"

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install
        run: |
          pnpm install --frozen-lockfile
          test -x node_modules/.bin/vp

      - name: Check template mirror
        run: node scripts/mirror-template.mjs --check

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COREPACK_HOME: ${{ runner.temp }}/corepack-home
      HOME: ${{ runner.temp }}/home

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          mkdir -p "$RUNNER_TEMP/corepack-bin" "$COREPACK_HOME" "$HOME"
          corepack enable --install-directory "$RUNNER_TEMP/corepack-bin"
          corepack prepare pnpm@11.9.0 --activate
          echo "$RUNNER_TEMP/corepack-bin" >> "$GITHUB_PATH"

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install
        run: |
          pnpm install --frozen-lockfile
          test -x node_modules/.bin/vp

      - name: Build dashboard
        working-directory: apps/dashboard
        run: pnpm exec vp build
